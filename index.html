<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>স্কোর কত</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#484f58;--green:#3fb950;--blue:#58a6ff;--red:#f85149;}
.light{--bg:#ffffff;--bg2:#f6f8fa;--bg3:#eaeef2;--border:#d0d7de;--text:#1f2328;--text2:#656d76;--text3:#9198a1;--green:#1a7f37;--blue:#0969da;--red:#cf222e;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Hind Siliguri',sans-serif;min-height:100vh;transition:background .2s,color .2s}
body.en{font-family:'Inter',sans-serif}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* NAV */
.nav{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:99}
.logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;color:var(--text);text-decoration:none;flex-shrink:0}
.logo-mark{width:28px;height:28px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff}
.nav-mid{display:flex;gap:2px;flex:1}
.ntab{padding:5px 12px;border:none;background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;border-radius:6px;font-family:inherit;transition:all .15s;white-space:nowrap}
.ntab:hover{background:var(--bg3);color:var(--text)}
.ntab.on{background:var(--bg3);color:var(--text)}
.nav-r{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0}
.stog{display:flex;background:var(--bg3);border-radius:6px;padding:2px;gap:2px}
.sbtn{padding:4px 10px;border:none;border-radius:5px;background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.sbtn.on{background:var(--bg2);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.ibtn{width:30px;height:30px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.lbtn{height:30px;padding:0 10px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);border-radius:6px;cursor:pointer;font-size:11px;font-weight:700;font-family:'Inter',sans-serif}

/* DATE BAR */
.datebar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:42px;display:flex;align-items:center;gap:4px;overflow-x:auto}
.dtab{padding:4px 14px;border:none;border-radius:20px;background:transparent;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;display:flex;flex-direction:column;align-items:center;line-height:1.3}
.dtab:hover{color:var(--text2)}
.dtab.on{background:var(--green);color:#fff}
.dtab-day{font-size:11px;opacity:.8}
.dtab-date{font-size:13px;font-weight:700}

/* LAYOUT */
.wrap{max-width:1100px;margin:0 auto;padding:16px;display:grid;grid-template-columns:1fr 280px;gap:16px}
@media(max-width:800px){.wrap{grid-template-columns:1fr}.sidebar{display:none}}
@media(max-width:480px){.wrap{padding:8px;padding-bottom:72px}.nav-mid{display:none}.stog{display:none}}

/* SECTION */
.slabel{font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--text3);margin:14px 0 8px;display:flex;align-items:center;gap:6px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.slabel:first-child{margin-top:0}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-red{background:var(--red);animation:blink 1.2s infinite}
.dot-blue{background:var(--blue)}
.dot-gray{background:var(--text3)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s,transform .15s}
.card:hover{border-color:var(--text3);transform:translateY(-1px)}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.league{font-size:11px;color:var(--text3);font-weight:600}
.status-tag{font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px}
.s-live{color:var(--red)}
.s-up{color:var(--blue)}
.s-ft{color:var(--text3)}
.teams{display:flex;align-items:center;gap:8px}
.team{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.team.away{flex-direction:row-reverse}
.team.away .tinfo{text-align:right}
.tname{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.csc{font-size:12px;font-weight:700;color:var(--green);margin-top:2px}
.csc.away{color:var(--text2)}
.cov{font-size:10px;font-weight:400;color:var(--text3)}
.scbox{text-align:center;min-width:80px;flex-shrink:0}
.scn{font-size:24px;font-weight:800;font-family:'Inter',sans-serif;letter-spacing:2px;color:var(--text)}
.scn.live{color:var(--red)}
.scsep{color:var(--text3);margin:0 2px}
.scvs{font-size:16px;font-weight:800;color:var(--border);letter-spacing:3px;font-family:'Inter',sans-serif}
.scmin{font-size:10px;color:var(--red);font-weight:700;margin-top:2px}
.sctime{font-size:11px;color:var(--blue);margin-top:2px;font-weight:600}
.cbot{margin-top:10px;padding-top:8px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px}
.venue{font-size:11px;color:var(--text3)}

/* LOADING / ERROR */
.loading{text-align:center;padding:40px;color:var(--text3)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{text-align:center;padding:30px;color:var(--red);font-size:13px}
.soon{text-align:center;padding:60px 0;color:var(--text3)}
.soon .soon-icon{font-size:32px;margin-bottom:8px}

/* SIDEBAR */
.widget{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px}
.wtitle{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}

/* FOOTER */
.footer{border-top:1px solid var(--border);padding:14px 16px;text-align:center;font-size:11px;color:var(--text3)}
.footer b{color:var(--text2);font-weight:600}

/* MOBILE NAV */
.mobnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:6px 0 12px;z-index:99}
@media(max-width:480px){.mobnav{display:flex;justify-content:space-around}}
.mbtn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;color:var(--text3);font-family:inherit;padding:4px 8px}
.mbtn.on{color:var(--green)}
.micon{font-size:18px}
.mlabel{font-size:10px;font-weight:600}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;animation:su .2s ease}
@keyframes su{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.mhead{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border)}
.mleague{font-size:12px;font-weight:700;color:var(--text3)}
.mcls{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.mbody{padding:20px 16px}
.mteams{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
.mteam{text-align:center;flex:1}
.mname{font-size:14px;font-weight:700;color:var(--text);margin-top:8px}
.msbox{text-align:center;min-width:100px}
.mscore{font-size:40px;font-weight:800;letter-spacing:3px;font-family:'Inter',sans-serif;color:var(--text)}
.mscore.live{color:var(--red)}
.mvenue{text-align:center;font-size:11px;color:var(--text3);margin-top:12px}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── CLUBS ────────────────────────────────────────────────────
const CLUBS={
  "Arsenal":{s:"AFC",c:"#EF0107"},"Chelsea":{s:"CFC",c:"#034694"},
  "Manchester City":{s:"MC",c:"#1C2C5B"},"Liverpool":{s:"LFC",c:"#C8102E"},
  "Tottenham Hotspur":{s:"THF",c:"#132257"},"Manchester United":{s:"MUN",c:"#DA291C"},
  "Newcastle United":{s:"NEW",c:"#241F20"},"Aston Villa":{s:"AVL",c:"#670E36"},
  "West Ham United":{s:"WHU",c:"#7A263A"},"Brighton & Hove Albion":{s:"BHA",c:"#0057B8"},
  "Real Madrid CF":{s:"RM",c:"#00529F"},"FC Barcelona":{s:"FCB",c:"#A50044"},
  "Club Atletico de Madrid":{s:"ATM",c:"#CB3524"},"Sevilla FC":{s:"SEV",c:"#D40000"},
  "Real Betis Balompié":{s:"BET",c:"#00A650"},"Valencia CF":{s:"VCF",c:"#FF7B01"},
  "Girona FC":{s:"GIR",c:"#CD1212"},"Real Sociedad de Fútbol":{s:"RSO",c:"#0067B1"},
  "Rayo Vallecano de Madrid":{s:"RVD",c:"#FF0000"},"Real Oviedo":{s:"ROV",c:"#003DA5"},
  "Villarreal CF":{s:"VIL",c:"#FFD700"},"Athletic Club":{s:"ATH",c:"#EE2523"},
  "Bayern München":{s:"FCB",c:"#DC052D"},"Borussia Dortmund":{s:"BVB",c:"#FDE100"},
  "Bayer 04 Leverkusen":{s:"B04",c:"#E32221"},"RB Leipzig":{s:"RBL",c:"#DD0741"},
  "Paris Saint-Germain FC":{s:"PSG",c:"#003170"},
  "Juventus FC":{s:"JUV",c:"#000000"},"AC Milan":{s:"MIL",c:"#FB090B"},
  "FC Internazionale Milano":{s:"INT",c:"#010E80"},"SSC Napoli":{s:"NAP",c:"#12A0D7"},
};
const FLAGS={
  "Argentina":"🇦🇷","France":"🇫🇷","Brazil":"🇧🇷","Germany":"🇩🇪",
  "Bangladesh":"🇧🇩","India":"🇮🇳","Pakistan":"🇵🇰","England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿",
  "Spain":"🇪🇸","Portugal":"🇵🇹","Italy":"🇮🇹","Netherlands":"🇳🇱",
  "Belgium":"🇧🇪","Croatia":"🇭🇷","Morocco":"🇲🇦","Japan":"🇯🇵",
  "South Korea":"🇰🇷","Australia":"🇦🇺","USA":"🇺🇸","Mexico":"🇲🇽",
  "Canada":"🇨🇦","Uruguay":"🇺🇾","Colombia":"🇨🇴","South Africa":"🇿🇦",
  "New Zealand":"🇳🇿","Sri Lanka":"🇱🇰","Afghanistan":"🇦🇫","Zimbabwe":"🇿🇼",
  "West Indies":"🏝️","Ireland":"🇮🇪","Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Kenya":"🇰🇪",
  "Fiji":"🇫🇯","Philippines":"🇵🇭","China":"🇨🇳","Malaysia":"🇲🇾",
  "China Women":"🇨🇳","Malaysia Women":"🇲🇾","India Women":"🇮🇳",
  "Australia Women":"🇦🇺","England Women":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Pakistan Women":"🇵🇰",
};

function tlogo(name, lg) {
  const sz=lg?48:34; const fs=lg?42:26; const bfs=lg?13:10;
  if(FLAGS[name]) return `<span style="font-size:${fs}px;line-height:1;flex-shrink:0">${FLAGS[name]}</span>`;
  if(CLUBS[name]) return `<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${CLUBS[name].c};display:flex;align-items:center;justify-content:center;font-size:${bfs}px;font-weight:800;color:#fff;flex-shrink:0;font-family:'Inter',sans-serif">${CLUBS[name].s}</div>`;
  const init=name.split(' ').map(w=>w[0]||'').join('').substring(0,3).toUpperCase();
  return `<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:${bfs}px;font-weight:800;color:var(--text2);flex-shrink:0;font-family:'Inter',sans-serif">${init}</div>`;
}

// ── BD DATE HELPERS ──────────────────────────────────────────
function getBDDate(offset=0) {
  const now=new Date();
  const bd=new Date(now.getTime()+(6*60*60*1000));
  bd.setDate(bd.getDate()+offset);
  return bd;
}

function formatBDDate(offset, lang) {
  const d=getBDDate(offset);
  const days={bn:["রবি","সোম","মঙ্গল","বুধ","বৃহঃ","শুক্র","শনি"],en:["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]};
  const months={bn:["জানু","ফেব্রু","মার্চ","এপ্রিল","মে","জুন","জুলাই","আগস্ট","সেপ্টে","অক্টো","নভে","ডিসে"],en:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]};
  const day=days[lang][d.getUTCDay()];
  const date=d.getUTCDate();
  return {day, date: lang==="bn"?bnN(date):String(date)};
}

function fmtTime(utcDate) {
  if(!utcDate) return "";
  try {
    const d=new Date(utcDate);
    return d.toLocaleTimeString(S.lang==="bn"?"bn-BD":"en-GB",{hour:"2-digit",minute:"2-digit",timeZone:"Asia/Dhaka"});
  } catch(e){return"";}
}

function bnN(n){return S.lang==="bn"?String(n).replace(/\d/g,d=>"০১২৩৪৫৬৭৮৯"[d]):String(n);}
function cleanLeague(n){if(!n)return"Cricket";if(/^[0-9a-f-]{30,}$/.test(n))return"Cricket Match";return n.length>35?n.substring(0,35)+"...":n;}

// ── STATE ────────────────────────────────────────────────────
let S={
  sport:"football",dateOffset:0,nav:0,lang:"bn",dark:true,
  detail:null,fMatches:[],cMatches:[],standings:[],
  loading:false,error:null,
};

const NAVS={bn:["ম্যাচ","লিগ","পছন্দ"],en:["Matches","Leagues","Following"]};
const MOBN={bn:[{i:"📅",l:"ম্যাচ"},{i:"🏆",l:"লিগ"},{i:"⭐",l:"পছন্দ"},{i:"☰",l:"আরো"}],en:[{i:"📅",l:"Matches"},{i:"🏆",l:"Leagues"},{i:"⭐",l:"Following"},{i:"☰",l:"More"}]};

// ── PROCESS ──────────────────────────────────────────────────
function getStatus(m){
  const s=m.status||"";
  if(["IN_PLAY","PAUSED"].includes(s))return"live";
  if(["FINISHED","FT"].includes(s))return"finished";
  if(m.matchStarted&&!m.matchEnded)return"live";
  if(m.matchEnded)return"finished";
  return"upcoming";
}
function getScore(m,side){
  const ft=m.score?.fullTime||m.score?.regularTime;
  if(ft)return side==="home"?ft.home:ft.away;
  return null;
}

function processF(raw,idx){
  return {
    _idx:idx,status:getStatus(raw),minute:raw.minute||"",
    league:raw.competition?.name||"Football",isF:true,
    homeName:raw.homeTeam?.name||"",awayName:raw.awayTeam?.name||"",
    homeScore:getScore(raw,"home"),awayScore:getScore(raw,"away"),
    venue:raw.venue||"",utcDate:raw.utcDate||"",
  };
}
function processC(raw,idx){
  return {
    _idx:idx,status:getStatus(raw),isF:false,
    league:cleanLeague(raw.name||raw.series||""),
    homeName:raw.teams?.[0]||"",awayName:raw.teams?.[1]||"",
    homeScore:raw.score?.[0]?.r!=null?`${raw.score[0].r}/${raw.score[0].w||0}`:null,
    awayScore:raw.score?.[1]?.r!=null?`${raw.score[1].r}/${raw.score[1].w||0}`:null,
    homeOvers:raw.score?.[0]?.o||"",awayOvers:raw.score?.[1]?.o||"",
    venue:raw.venue||"",statusNote:raw.status||"",
  };
}

// ── API ──────────────────────────────────────────────────────
async function fetchFootball(){
  S.loading=true;S.error=null;render();
  try{
    const r=await fetch(`/api/football?endpoint=today&dateOffset=${S.dateOffset}`);
    const d=await r.json();
    S.fMatches=d.matches||[];
    if(d.error)S.error=S.lang==="bn"?"ডেটা লোড হয়নি":"Failed to load";
  }catch(e){S.error=S.lang==="bn"?"সংযোগ সমস্যা হয়েছে":"Connection error";}
  S.loading=false;render();
}
async function fetchCricket(){
  S.loading=true;S.error=null;render();
  try{
    const r=await fetch('/api/cricket?endpoint=live');
    const d=await r.json();
    S.cMatches=d.data||[];
  }catch(e){S.error=S.lang==="bn"?"সংযোগ সমস্যা হয়েছে":"Connection error";}
  S.loading=false;render();
}
async function fetchStandings(){
  try{
    const r=await fetch('/api/football?endpoint=pl-standings&dateOffset=0');
    const d=await r.json();
    S.standings=d.standings?.[0]?.table||[];render();
  }catch(e){}
}

// ── RENDER ───────────────────────────────────────────────────
function render(){
  document.documentElement.classList.toggle("light",!S.dark);
  document.body.classList.toggle("en",S.lang==="en");
  const isF=S.sport==="football";
  const lang=S.lang;
  const navs=NAVS[lang];
  const mobn=MOBN[lang];

  const processed=isF?S.fMatches.map((m,i)=>processF(m,i)):S.cMatches.map((m,i)=>processC(m,i));
  const live=processed.filter(m=>m.status==="live");
  const upcoming=processed.filter(m=>m.status==="upcoming");
  const finished=processed.filter(m=>m.status==="finished");
  const liveCount=live.length;

  // Date tabs — show 5 days around today
  const dateOffsets=[-1,0,1,2,3];
  const dateTabs=dateOffsets.map(o=>{
    const {day,date}=formatBDDate(o,lang);
    let label=day;
    if(o===0)label=lang==="bn"?"আজ":"Today";
    if(o===-1)label=lang==="bn"?"গতকাল":"Yesterday";
    return {offset:o,day:label,date};
  });

  document.getElementById("app").innerHTML=`
  <nav class="nav">
    <a class="logo" href="#" onclick="return false">
      <div class="logo-mark">${lang==="bn"?"স্ক":"SK"}</div>
      <span>${lang==="bn"?"স্কোর কত":"Score Koto"}</span>
    </a>
    <div class="nav-mid">
      ${navs.map((t,i)=>`<button class="ntab ${S.nav===i?"on":""}" onclick="setNav(${i})">${t}</button>`).join("")}
    </div>
    <div class="nav-r">
      ${liveCount>0?`<span style="font-size:12px;font-weight:700;color:var(--red);display:flex;align-items:center;gap:4px"><span class="dot dot-red"></span>${bnN(liveCount)} ${lang==="bn"?"লাইভ":"Live"}</span>`:""}
      <div class="stog">
        <button class="sbtn ${S.sport==="football"?"on":""}" onclick="setSport('football')">⚽ ${lang==="bn"?"ফুটবল":"Football"}</button>
        <button class="sbtn ${S.sport==="cricket"?"on":""}" onclick="setSport('cricket')">🏏 ${lang==="bn"?"ক্রিকেট":"Cricket"}</button>
      </div>
      <button class="lbtn" onclick="toggleLang()">${lang==="bn"?"EN":"বাং"}</button>
      <button class="ibtn" onclick="toggleTheme()">${S.dark?"☀️":"🌙"}</button>
    </div>
  </nav>

  <div class="datebar">
    ${dateTabs.map(t=>`
    <button class="dtab ${S.dateOffset===t.offset?"on":""}" onclick="setDate(${t.offset})">
      <span class="dtab-day">${t.day}</span>
      <span class="dtab-date">${t.date}</span>
    </button>`).join("")}
  </div>

  <div class="wrap">
    <div>
      ${S.nav!==0?`<div class="soon"><div class="soon-icon">🚧</div><div>${lang==="bn"?"শীঘ্রই আসছে":"Coming Soon"}</div></div>`:`
      ${S.loading?`<div class="loading"><div class="spinner"></div>${lang==="bn"?"লোড হচ্ছে...":"Loading..."}</div>`:`
      ${S.error?`<div class="err">⚠️ ${S.error}</div>`:`
      ${processed.length===0?`<div class="soon"><div class="soon-icon">📭</div><div>${lang==="bn"?"এই দিনে কোনো ম্যাচ নেই":"No matches on this day"}</div></div>`:`
      ${live.length>0?`<div class="slabel"><span class="dot dot-red"></span>${lang==="bn"?"এখন চলছে":"LIVE NOW"}</div>${live.map(m=>cardH(m,lang)).join("")}`:""}
      ${upcoming.length>0?`<div class="slabel"><span class="dot dot-blue"></span>${lang==="bn"?"আসছে":"UPCOMING"}</div>${upcoming.map(m=>cardH(m,lang)).join("")}`:""}
      ${finished.length>0?`<div class="slabel"><span class="dot dot-gray"></span>${lang==="bn"?"শেষ হয়েছে":"FINISHED"}</div>${finished.map(m=>cardH(m,lang)).join("")}`:""}
      `}`}`}`}
    </div>
    <div class="sidebar">
      <div class="widget">
        <div class="wtitle">${lang==="bn"?"প্রিমিয়ার লিগ স্ট্যান্ডিংস":"Premier League Standings"}</div>
        ${S.standings.length>0?`
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <tr style="color:var(--text3);font-size:11px">
            <th style="padding:3px;text-align:left;font-weight:600">#</th>
            <th style="padding:3px;text-align:left;font-weight:600">${lang==="bn"?"দল":"Team"}</th>
            <th style="padding:3px;text-align:center;font-weight:600">P</th>
            <th style="padding:3px;text-align:center;font-weight:600">GD</th>
            <th style="padding:3px;text-align:center;font-weight:600;color:var(--green)">Pts</th>
          </tr>
          ${S.standings.slice(0,10).map(s=>`
          <tr style="border-bottom:1px solid var(--border)">
            <td style="padding:5px 3px;color:var(--text3);font-family:'Inter',sans-serif;font-size:11px">${s.position}</td>
            <td style="padding:5px 3px;font-weight:600">${s.team?.shortName||s.team?.name||""}</td>
            <td style="padding:5px 3px;text-align:center;font-family:'Inter',sans-serif">${s.playedGames}</td>
            <td style="padding:5px 3px;text-align:center;font-family:'Inter',sans-serif;color:${s.goalDifference>0?"var(--green)":s.goalDifference<0?"var(--red)":"var(--text2)"}">${s.goalDifference>0?"+":""}${s.goalDifference}</td>
            <td style="padding:5px 3px;text-align:center;font-weight:700;font-family:'Inter',sans-serif">${s.points}</td>
          </tr>`).join("")}
        </table>`:`<div style="text-align:center;color:var(--text3);font-size:12px;padding:10px">${lang==="bn"?"লোড হচ্ছে...":"Loading..."}</div>`}
      </div>
    </div>
  </div>

  <div class="footer">
    ${lang==="bn"?`ডেভেলপ করেছেন <b>মাহবুব হাসান তন্ময়</b>`:`Developed by <b>Mahbub Hasan Tonmoy</b>`}
  </div>

  <div class="mobnav">
    <button class="mbtn ${S.sport==="football"?"on":""}" onclick="setSport('football')"><span class="micon">⚽</span><span class="mlabel">${lang==="bn"?"ফুটবল":"Football"}</span></button>
    <button class="mbtn ${S.sport==="cricket"?"on":""}" onclick="setSport('cricket')"><span class="micon">🏏</span><span class="mlabel">${lang==="bn"?"ক্রিকেট":"Cricket"}</span></button>
    ${mobn.slice(0,2).map((n,i)=>`<button class="mbtn ${S.nav===i?"on":""}" onclick="setNav(${i})"><span class="micon">${n.i}</span><span class="mlabel">${n.l}</span></button>`).join("")}
    <button class="mbtn" onclick="toggleLang()"><span class="micon">🌐</span><span class="mlabel">${lang==="bn"?"EN":"বাং"}</span></button>
    <button class="mbtn" onclick="toggleTheme()"><span class="micon">${S.dark?"☀️":"🌙"}</span><span class="mlabel">${lang==="bn"?"থিম":"Theme"}</span></button>
  </div>

  ${S.detail?modalH(S.detail,lang):""}
  `;
}

function cardH(m,lang){
  const isLive=m.status==="live";const isDone=m.status==="finished";
  return `
  <div class="card" onclick="openDetail(${m._idx})">
    <div class="card-top">
      <span class="league">${m.isF?"⚽":"🏏"} ${m.league}</span>
      ${isLive?`<span class="status-tag s-live"><span class="dot dot-red"></span>${m.isF&&m.minute?bnN(m.minute)+"′ ":""}${lang==="bn"?"লাইভ":"LIVE"}</span>`:""}
      ${m.status==="upcoming"?`<span class="status-tag s-up">${fmtTime(m.utcDate)||""}</span>`:""}
      ${isDone?`<span class="status-tag s-ft">${lang==="bn"?"শেষ":"FT"}</span>`:""}
    </div>
    <div class="teams">
      <div class="team">
        ${tlogo(m.homeName,false)}
        <div class="tinfo">
          <div class="tname">${m.homeName}</div>
          ${!m.isF&&m.homeScore?`<div class="csc">${m.homeScore}${m.homeOvers?` <span class="cov">(${m.homeOvers})</span>`:""}</div>`:""}
        </div>
      </div>
      <div class="scbox">
        ${m.isF&&(isLive||isDone)&&m.homeScore!==null?`<div class="scn ${isLive?"live":""}">${m.homeScore??"-"}<span class="scsep">–</span>${m.awayScore??"-"}</div>${isLive&&m.minute?`<div class="scmin">${bnN(m.minute)}′</div>`:""}`:""}
        ${m.status==="upcoming"?`<div class="scvs">VS</div><div class="sctime">${fmtTime(m.utcDate)||""}</div>`:""}
      </div>
      <div class="team away">
        ${tlogo(m.awayName,false)}
        <div class="tinfo">
          <div class="tname">${m.awayName}</div>
          ${!m.isF&&m.awayScore?`<div class="csc away">${m.awayScore}${m.awayOvers?` <span class="cov">(${m.awayOvers})</span>`:""}</div>`:""}
        </div>
      </div>
    </div>
    ${m.venue?`<div class="cbot"><span class="venue">📍 ${m.venue}</span></div>`:""}
  </div>`;
}

function modalH(m,lang){
  const isLive=m.status==="live";const isDone=m.status==="finished";
  return `
  <div class="overlay" onclick="if(event.target===this)goBack()">
    <div class="modal">
      <div class="mhead">
        <span class="mleague">${m.isF?"⚽":"🏏"} ${m.league}</span>
        <button class="mcls" onclick="goBack()">✕</button>
      </div>
      <div class="mbody">
        ${isLive?`<div style="text-align:center;margin-bottom:14px"><span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--red)"><span class="dot dot-red"></span>${m.isF&&m.minute?bnN(m.minute)+"′ ":""}${lang==="bn"?"লাইভ চলছে":"LIVE"}</span></div>`:""}
        <div class="mteams">
          <div class="mteam">${tlogo(m.homeName,true)}<div class="mname">${m.homeName}</div>${!m.isF&&m.homeScore?`<div style="font-size:15px;font-weight:800;color:var(--green);margin-top:4px">${m.homeScore}</div>`:""}</div>
          <div class="msbox">
            ${m.isF&&(isLive||isDone)&&m.homeScore!==null?`<div class="mscore ${isLive?"live":""}">${m.homeScore??"-"}<span style="color:var(--text3);margin:0 5px;font-size:26px">–</span>${m.awayScore??"-"}</div>`:""}
            ${m.status==="upcoming"?`<div style="font-size:22px;font-weight:800;color:var(--border);letter-spacing:4px;font-family:'Inter',sans-serif">VS</div><div style="font-size:13px;color:var(--blue);margin-top:6px;font-weight:600">${fmtTime(m.utcDate)||""}</div>`:""}
          </div>
          <div class="mteam">${tlogo(m.awayName,true)}<div class="mname">${m.awayName}</div>${!m.isF&&m.awayScore?`<div style="font-size:15px;font-weight:800;color:var(--text2);margin-top:4px">${m.awayScore}</div>`:""}</div>
        </div>
        ${!m.isF&&isLive?`<div style="display:flex;gap:16px;justify-content:center;margin-bottom:12px"><span style="font-size:13px;color:var(--text2)">CRR <b style="color:var(--green)">${m.crr||"—"}</b></span><span style="font-size:13px;color:var(--text2)">RRR <b style="color:var(--red)">${m.rrr||"—"}</b></span></div>`:""}
        ${m.venue?`<div class="mvenue">📍 ${m.venue}</div>`:""}
      </div>
    </div>
  </div>`;
}

// ── ACTIONS ──────────────────────────────────────────────────
function openDetail(idx){
  const isF=S.sport==="football";
  const raw=isF?S.fMatches[idx]:S.cMatches[idx];
  if(!raw)return;
  S.detail=isF?processF(raw,idx):processC(raw,idx);
  render();
}
function goBack(){S.detail=null;render();}
function setSport(s){S.sport=s;S.detail=null;if(s==="football")fetchFootball();else fetchCricket();}
function setDate(offset){S.dateOffset=offset;S.detail=null;if(S.sport==="football")fetchFootball();else fetchCricket();}
function setNav(i){S.nav=i;render();}
function toggleLang(){S.lang=S.lang==="bn"?"en":"bn";render();}
function toggleTheme(){S.dark=!S.dark;render();}

// ── INIT ────────────────────────────────────────────────────
fetchFootball();
fetchStandings();
setInterval(()=>{if(S.sport==="football")fetchFootball();else fetchCricket();},60000);
</script>
</body>
</html>
