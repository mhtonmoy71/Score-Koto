<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>স্কোর কত</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#484f58;--green:#3fb950;--blue:#58a6ff;--red:#f85149;}
.light{--bg:#ffffff;--bg2:#f6f8fa;--bg3:#eaeef2;--border:#d0d7de;--text:#1f2328;--text2:#656d76;--text3:#9198a1;--green:#1a7f37;--blue:#0969da;--red:#cf222e;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Hind Siliguri',sans-serif;min-height:100vh;transition:background .2s,color .2s}
body.en{font-family:'Inter',sans-serif}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.nav{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:99}
.logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;color:var(--text);text-decoration:none;flex-shrink:0}
.logo-mark{width:28px;height:28px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff}
.nav-mid{display:flex;gap:2px;flex:1}
.ntab{padding:5px 12px;border:none;background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;border-radius:6px;font-family:inherit;transition:all .15s;white-space:nowrap}
.ntab:hover{background:var(--bg3);color:var(--text)}
.ntab.on{background:var(--bg3);color:var(--text)}
.nav-r{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0}
.stog{display:flex;background:var(--bg3);border-radius:6px;padding:2px;gap:2px}
.sbtn{padding:4px 10px;border:none;border-radius:5px;background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.sbtn.on{background:var(--bg2);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.ibtn{width:30px;height:30px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.lbtn{height:30px;padding:0 10px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);border-radius:6px;cursor:pointer;font-size:11px;font-weight:700;font-family:'Inter',sans-serif}
.datebar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:46px;display:flex;align-items:center;gap:4px;overflow-x:auto}
.dtab{padding:4px 12px;border:none;border-radius:20px;background:transparent;color:var(--text3);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;display:flex;flex-direction:column;align-items:center;line-height:1.4}
.dtab:hover{color:var(--text2)}
.dtab.on{background:var(--green);color:#fff}
.wrap{max-width:1100px;margin:0 auto;padding:16px;display:grid;grid-template-columns:1fr 280px;gap:16px}
@media(max-width:800px){.wrap{grid-template-columns:1fr}.sidebar{display:none}}
@media(max-width:480px){.wrap{padding:8px;padding-bottom:76px}.nav-mid,.stog{display:none}}
.slabel{font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--text3);margin:14px 0 8px;display:flex;align-items:center;gap:6px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.slabel:first-child{margin-top:0}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-red{background:var(--red);animation:blink 1.2s infinite}
.dot-blue{background:var(--blue)}
.dot-gray{background:var(--text3)}

/* FOOTBALL CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s,transform .15s}
.card:hover{border-color:var(--text3);transform:translateY(-1px)}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.league{font-size:11px;color:var(--text3);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:65%}
.stag{font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px;flex-shrink:0}
.s-live{color:var(--red)}
.s-up{color:var(--blue)}
.s-ft{color:var(--text3)}
.teams{display:flex;align-items:center;gap:6px}
.team{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.team.away{flex-direction:row-reverse}
.team.away .tname{text-align:right}

.scbox{text-align:center;min-width:72px;flex-shrink:0}

.scsep{color:var(--text3);margin:0 2px}
.scvs{font-size:15px;font-weight:800;color:var(--border);letter-spacing:2px;font-family:'Inter',sans-serif}
.scmin{font-size:10px;color:var(--red);font-weight:700;margin-top:2px}

.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}

@media(min-width:480px){.modal{border-radius:12px}}
@keyframes su{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

.mleague{font-size:12px;font-weight:700;color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mcls{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:8px}

/* FOOTBALL MODAL */
.mteams{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:16px}
.mteam{text-align:center;flex:1;min-width:0}
.mlogo{display:flex;justify-content:center;margin-bottom:8px}
.mname{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msbox{text-align:center;flex-shrink:0;min-width:90px}
.mscore{font-size:36px;font-weight:800;letter-spacing:2px;font-family:'Inter',sans-serif;color:var(--text)}
.mscore.live{color:var(--red)}
.mvenue{text-align:center;font-size:11px;color:var(--text3);margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}

/* CRICKET MODAL SCORECARD */

.sc-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.8px;margin-bottom:12px;text-transform:uppercase}
.sc-inning{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.sc-inning:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.sc-inning-name{font-size:11px;color:var(--text3);font-weight:600;margin-bottom:4px}
.sc-inning-score{font-size:24px;font-weight:800;font-family:'Inter',sans-serif;color:var(--green)}
.sc-inning-overs{font-size:11px;color:var(--text3);margin-top:2px}
.sc-status{font-size:12px;font-weight:600;color:var(--blue);margin-top:10px;text-align:center;padding:8px;background:var(--bg2);border-radius:6px}
.m-venue{text-align:center;font-size:11px;color:var(--text3);margin-top:12px}
</style>
</head>
<body>
<div id="app"></div>
<script>

  "South Korea":"🇰🇷","USA":"🇺🇸","Mexico":"🇲🇽","Canada":"🇨🇦",
  "Fiji":"🇫🇯","Philippines":"🇵🇭","China":"🇨🇳","Malaysia":"🇲🇾",
  "Papua New Guinea":"🇵🇬","Samoa":"🇼🇸","Vanuatu":"🇻🇺","Cook Islands":"🇨🇰",
  "Nepal":"🇳🇵","Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Indonesia":"🇮🇩",
  // Women
  "India Women":"🇮🇳","Australia Women":"🇦🇺","England Women":"🏴󠁧󠁢󠁥󠁮󠁧󠁿",
  "New Zealand Women":"🇳🇿","Pakistan Women":"🇵🇰","South Africa Women":"🇿🇦",
  "Bangladesh Women":"🇧🇩","West Indies Women":"🏝️","Sri Lanka Women":"🇱🇰",
  "China Women":"🇨🇳","Malaysia Women":"🇲🇾",
  "Sri Lanka A Women":"🇱🇰","New Zealand A Women":"🇳🇿",
};

function tlogo(name,lg){
  const sz=lg?44:30;const fs=lg?36:22;const bfs=lg?11:9;
  if(FLAGS[name])return`<span style="font-size:${fs}px;line-height:1;flex-shrink:0">${FLAGS[name]}</span>`;
  if(CLUBS[name])return`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${CLUBS[name].c};display:flex;align-items:center;justify-content:center;font-size:${bfs}px;font-weight:800;color:#fff;flex-shrink:0;font-family:'Inter',sans-serif">${CLUBS[name].s}</div>`;
  const init=name.split(' ').map(w=>w[0]||'').join('').substring(0,3).toUpperCase();
  return`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:${bfs}px;font-weight:800;color:var(--text2);flex-shrink:0;font-family:'Inter',sans-serif">${init}</div>`;
}

// ── HELPERS ──────────────────────────────────────────────────
function getBDDate(offset=0){
  const now=new Date();
  const bd=new Date(now.getTime()+(6*60*60*1000));
  bd.setDate(bd.getDate()+parseInt(offset));
  return bd;
}
function formatTab(offset,lang){
  const d=getBDDate(offset);
  const days={bn:["রবি","সোম","মঙ্গল","বুধ","বৃহঃ","শুক্র","শনি"],en:["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]};
  const label=offset===0?(lang==="bn"?"আজ":"Today"):offset===-1?(lang==="bn"?"গতকাল":"Yesterday"):days[lang][d.getUTCDay()];
  const date=d.getUTCDate();
  return{label,date:lang==="bn"?bnN(date):String(date)};
}
function fmtTime(utcDate){
  if(!utcDate)return"";
  try{return new Date(utcDate).toLocaleTimeString(S.lang==="bn"?"bn-BD":"en-GB",{hour:"2-digit",minute:"2-digit",timeZone:"Asia/Dhaka"});}catch(e){return"";}
}
function bnN(n){return S.lang==="bn"?String(n).replace(/\d/g,d=>"০১২৩৪৫৬৭৮৯"[d]):String(n);}

// ── CRICKET SCORE PARSER ─────────────────────────────────────
function parseCricketScores(raw) {
  const teams = raw.teams || [];
  const scores = raw.score || [];
  const home = teams[0] || "";
  const away = teams[1] || "";

  // Find which score belongs to which team
  let homeInnings = [], awayInnings = [];

  scores.forEach(s => {
    const inning = (s.inning || "").toLowerCase();
    const homeLower = home.toLowerCase().split(' ')[0];
    const awayLower = away.toLowerCase().split(' ')[0];

    // Check if inning contains comma (mixed name like "Fiji,Philippines Inning 1")
    // This usually means it's the second team's innings
    if(inning.includes(',')) {
      // Second team batting
      awayInnings.push(s);
    } else if(inning.includes(homeLower)) {
      homeInnings.push(s);
    } else if(inning.includes(awayLower)) {
      awayInnings.push(s);
    } else {
      // Fallback by index
      if(homeInnings.length <= awayInnings.length) homeInnings.push(s);
      else awayInnings.push(s);
    }
  });

  // If no matches, assign by order
  if(homeInnings.length === 0 && awayInnings.length === 0 && scores.length > 0) {
    homeInnings = [scores[0]];
    if(scores[1]) awayInnings = [scores[1]];
  }

  const lastHome = homeInnings[homeInnings.length - 1];
  const lastAway = awayInnings[awayInnings.length - 1];

  return {
    homeScore: lastHome ? `${lastHome.r}/${lastHome.w || 0}` : null,
    awayScore: lastAway ? `${lastAway.r}/${lastAway.w || 0}` : null,
    homeOvers: lastHome ? `${lastHome.o}` : "",
    awayOvers: lastAway ? `${lastAway.o}` : "",
    allInnings: scores.map(s => ({
      name: s.inning || "",
      runs: s.r,
      wickets: s.w,
      overs: s.o,
    })),
  };
}

function isICCTeam(teams) {
  return teams.some(t => ICC_TEAMS.some(icc => t.toLowerCase().includes(icc)));
}

// ── STATE ────────────────────────────────────────────────────
let S={sport:"football",dateOffset:0,nav:0,lang:"bn",dark:true,detail:null,
  fMatches:[],cMatches:[],standings:[],loading:false,error:null};

const NAVS={bn:["ম্যাচ","লিগ","পছন্দ"],en:["Matches","Leagues","Following"]};
const MOBN={bn:[{i:"⚽",l:"ফুটবল"},{i:"🏏",l:"ক্রিকেট"},{i:"📅",l:"ম্যাচ"},{i:"🏆",l:"লিগ"},{i:"🌐",l:"ভাষা"},{i:"☀️",l:"থিম"}],
  en:[{i:"⚽",l:"Football"},{i:"🏏",l:"Cricket"},{i:"📅",l:"Matches"},{i:"🏆",l:"Leagues"},{i:"🌐",l:"Lang"},{i:"☀️",l:"Theme"}]};

function getStatusF(m){
  const s=m.status||"";
  if(["IN_PLAY","PAUSED"].includes(s))return"live";
  if(["FINISHED","FT"].includes(s))return"finished";
  return"upcoming";
}
function getScoreF(m,side){
  const ft=m.score?.fullTime||m.score?.regularTime;
  if(ft)return side==="home"?ft.home:ft.away;
  return null;
}

// ── API ──────────────────────────────────────────────────────
async function fetchFootball(){
  S.loading=true;S.error=null;render();
  try{
    const r=await fetch(`/api/football?endpoint=today&dateOffset=${S.dateOffset}`);
    const d=await r.json();
    S.fMatches=d.matches||[];
  }catch(e){S.error=S.lang==="bn"?"সংযোগ সমস্যা":"Connection error";}
  S.loading=false;render();
}
async function fetchCricket(){
  S.loading=true;S.error=null;render();
  try{
    // Fetch both live and upcoming matches
    const [r1, r2] = await Promise.all([
      fetch('/api/cricket?endpoint=live'),
      fetch('/api/cricket?endpoint=matches'),
    ]);
    const [d1, d2] = await Promise.all([r1.json(), r2.json()]);
    const live = d1.data || [];
    const all = d2.data || [];

    // Merge, remove duplicates, filter ICC teams
    const ids = new Set(live.map(m=>m.id));
    const merged = [...live, ...all.filter(m=>!ids.has(m.id))];
    S.cMatches = merged; // Show all, filter in render
  }catch(e){S.error=S.lang==="bn"?"সংযোগ সমস্যা":"Connection error";}
  S.loading=false;render();
}
async function fetchStandings(){
  try{
    const r=await fetch('/api/football?endpoint=pl-standings&dateOffset=0');
    const d=await r.json();
    S.standings=d.standings?.[0]?.table||[];render();
  }catch(e){}
}

// ── RENDER ───────────────────────────────────────────────────
function render(){
  document.documentElement.classList.toggle("light",!S.dark);
  document.body.classList.toggle("en",S.lang==="en");
  const isF=S.sport==="football";
  const lang=S.lang;
  const navs=NAVS[lang];
  const mobn=MOBN[lang];
  const dateOffsets=[-1,0,1,2,3];

  // Process matches
  let allM=[];
  if(isF){
    allM=S.fMatches.map((m,i)=>({
      _idx:i,isF:true,
      status:getStatusF(m),minute:m.minute||"",
      league:m.competition?.name||"Football",
      homeName:m.homeTeam?.name||"",awayName:m.awayTeam?.name||"",
      homeScore:getScoreF(m,"home"),awayScore:getScoreF(m,"away"),
      venue:m.venue||"",utcDate:m.utcDate||"",
    }));
  } else {
    // Filter: show ICC top 12 teams + IPL + major tournaments
    const filtered = S.cMatches.filter(m => {
      const teams = m.teams || [];
      const name = (m.name||"").toLowerCase();
      // Always show ICC teams
      if(isICCTeam(teams)) return true;
      // Show IPL
      if(name.includes("indian premier league") || name.includes("ipl")) return true;
      return false;
    });
    allM=filtered.map((m,i)=>{
      const parsed=parseCricketScores(m);
      const teams=m.teams||[];
      const isLive=m.matchStarted&&!m.matchEnded;
      const isDone=m.matchEnded;
      return{
        _idx:i,isF:false,
        status:isLive?"live":isDone?"finished":"upcoming",
        league:m.name||"Cricket",
        matchType:m.matchType||"",
        homeName:teams[0]||"",awayName:teams[1]||"",
        homeScore:parsed.homeScore,awayScore:parsed.awayScore,
        homeOvers:parsed.homeOvers,awayOvers:parsed.awayOvers,
        allInnings:parsed.allInnings,
        venue:m.venue||"",statusNote:m.status||"",
        utcDate:m.dateTimeGMT||"",
        teamInfo:m.teamInfo||[],
      };
    });
  }

  const live=allM.filter(m=>m.status==="live");
  const upcoming=allM.filter(m=>m.status==="upcoming");
  const finished=allM.filter(m=>m.status==="finished");
  const liveCount=live.length;

  document.getElementById("app").innerHTML=`
  <nav class="nav">
    <a class="logo" href="#" onclick="return false">
      <div class="logo-mark">${lang==="bn"?"স্ক":"SK"}</div>
      <span>${lang==="bn"?"স্কোর কত":"Score Koto"}</span>
    </a>
    <div class="nav-mid">
      ${navs.map((t,i)=>`<button class="ntab ${S.nav===i?"on":""}" onclick="setNav(${i})">${t}</button>`).join("")}
    </div>
    <div class="nav-r">
      ${liveCount>0?`<span style="font-size:12px;font-weight:700;color:var(--red);display:flex;align-items:center;gap:4px"><span class="dot dot-red"></span>${bnN(liveCount)} ${lang==="bn"?"লাইভ":"Live"}</span>`:""}
      <div class="stog">
        <button class="sbtn ${S.sport==="football"?"on":""}" onclick="setSport('football')">⚽ ${lang==="bn"?"ফুটবল":"Football"}</button>
        <button class="sbtn ${S.sport==="cricket"?"on":""}" onclick="setSport('cricket')">🏏 ${lang==="bn"?"ক্রিকেট":"Cricket"}</button>
      </div>
      <button class="lbtn" onclick="toggleLang()">${lang==="bn"?"EN":"বাং"}</button>
      <button class="ibtn" onclick="toggleTheme()">${S.dark?"☀️":"🌙"}</button>
    </div>
  </nav>

  <div class="datebar">
    ${dateOffsets.map(o=>{const{label,date}=formatTab(o,lang);return`<button class="dtab ${S.dateOffset===o?"on":""}" onclick="setDate(${o})"><span style="font-size:10px;opacity:.8">${label}</span><span style="font-size:14px;font-weight:700">${date}</span></button>`;}).join("")}
  </div>

  <div class="wrap">
    <div>
      ${S.nav!==0?`<div class="soon"><div class="soon-icon">🚧</div><div>${lang==="bn"?"শীঘ্রই আসছে":"Coming Soon"}</div></div>`:`
      ${S.loading?`<div class="loading"><div class="spinner"></div>${lang==="bn"?"লোড হচ্ছে...":"Loading..."}</div>`:`
      ${S.error?`<div class="err">⚠️ ${S.error}</div>`:`
      ${allM.length===0?`<div class="soon"><div class="soon-icon">📭</div><div>${lang==="bn"?"কোনো ম্যাচ পাওয়া যায়নি":"No matches found"}</div></div>`:`
      ${live.length>0?`<div class="slabel"><span class="dot dot-red"></span>${lang==="bn"?"এখন চলছে":"LIVE NOW"}</div>${live.map(m=>cardH(m,lang)).join("")}`:""}
      ${upcoming.length>0?`<div class="slabel"><span class="dot dot-blue"></span>${lang==="bn"?"আসছে":"UPCOMING"}</div>${upcoming.map(m=>cardH(m,lang)).join("")}`:""}
      ${finished.length>0?`<div class="slabel"><span class="dot dot-gray"></span>${lang==="bn"?"শেষ হয়েছে":"FINISHED"}</div>${finished.map(m=>cardH(m,lang)).join("")}`:""}
      `}`}`}`}
    </div>
    <div class="sidebar">
      <div class="widget">
        <div class="wtitle">${lang==="bn"?"প্রিমিয়ার লিগ স্ট্যান্ডিংস":"Premier League Standings"}</div>
        ${S.standings.length>0?`<table style="width:100%;border-collapse:collapse;font-size:12px">
          <tr style="color:var(--text3);font-size:11px"><th style="padding:3px;text-align:left">#</th><th style="padding:3px;text-align:left">${lang==="bn"?"দল":"Team"}</th><th style="padding:3px;text-align:center">P</th><th style="padding:3px;text-align:center">GD</th><th style="padding:3px;text-align:center;color:var(--green)">Pts</th></tr>
          ${S.standings.slice(0,10).map(s=>`<tr style="border-bottom:1px solid var(--border)"><td style="padding:5px 3px;color:var(--text3);font-size:11px;font-family:'Inter',sans-serif">${s.position}</td><td style="padding:5px 3px;font-weight:600">${s.team?.shortName||""}</td><td style="padding:5px 3px;text-align:center;font-family:'Inter',sans-serif">${s.playedGames}</td><td style="padding:5px 3px;text-align:center;font-family:'Inter',sans-serif;color:${s.goalDifference>0?"var(--green)":s.goalDifference<0?"var(--red)":"var(--text2)"}">${s.goalDifference>0?"+":""}${s.goalDifference}</td><td style="padding:5px 3px;text-align:center;font-weight:700;font-family:'Inter',sans-serif">${s.points}</td></tr>`).join("")}
        </table>`:`<div style="text-align:center;color:var(--text3);font-size:12px;padding:10px">${lang==="bn"?"লোড হচ্ছে...":"Loading..."}</div>`}
      </div>
    </div>
  </div>

  <div class="footer">${lang==="bn"?`ডেভেলপ করেছেন <b>মাহবুব হাসান তন্ময়</b>`:`Developed by <b>Mahbub Hasan Tonmoy</b>`}</div>

  <div class="mobnav">
    <button class="mbtn ${S.sport==="football"?"on":""}" onclick="setSport('football')"><span class="micon">⚽</span><span class="mlabel">${lang==="bn"?"ফুটবল":"Football"}</span></button>
    <button class="mbtn ${S.sport==="cricket"?"on":""}" onclick="setSport('cricket')"><span class="micon">🏏</span><span class="mlabel">${lang==="bn"?"ক্রিকেট":"Cricket"}</span></button>
    <button class="mbtn ${S.nav===0?"on":""}" onclick="setNav(0)"><span class="micon">📅</span><span class="mlabel">${lang==="bn"?"ম্যাচ":"Matches"}</span></button>
    <button class="mbtn ${S.nav===1?"on":""}" onclick="setNav(1)"><span class="micon">🏆</span><span class="mlabel">${lang==="bn"?"লিগ":"Leagues"}</span></button>
    <button class="mbtn" onclick="toggleLang()"><span class="micon">🌐</span><span class="mlabel">${lang==="bn"?"EN":"বাং"}</span></button>
    <button class="mbtn" onclick="toggleTheme()"><span class="micon">${S.dark?"☀️":"🌙"}</span><span class="mlabel">${lang==="bn"?"থিম":"Theme"}</span></button>
  </div>

  ${S.detail?modalH(S.detail,lang):""}
  `;
}

function cardH(m,lang){
  const isLive=m.status==="live";const isDone=m.status==="finished";
  if(!m.isF){
    // Cricket card — Cricbuzz style vertical
    return`<div class="ccard ${isLive?"clive":""}" onclick="openDetail(${m._idx})">
      <div class="card-top">
        <span class="league">🏏 ${m.matchType?m.matchType.toUpperCase()+" · ":""}</span>
        <span style="font-size:11px;color:var(--text3);font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.league}</span>
        ${isLive?`<span class="stag s-live" style="margin-left:8px"><span class="dot dot-red"></span>${lang==="bn"?"লাইভ":"LIVE"}</span>`:""}
        ${isDone?`<span class="stag s-ft" style="margin-left:8px">${lang==="bn"?"শেষ":"FT"}</span>`:""}
        ${m.status==="upcoming"?`<span class="stag s-up" style="margin-left:8px">${fmtTime(m.utcDate)||lang==="bn"?"আসছে":"Upcoming"}</span>`:""}
      </div>
      <div class="crow">
        <div class="crow-team">${tlogo(m.homeName,false)}<span class="crow-name">${m.homeName}</span></div>
        <div class="crow-score">
          <div class="crow-runs ${isLive?"batting":""}">${m.homeScore||"—"}</div>
          ${m.homeOvers?`<div class="crow-overs">(${m.homeOvers})</div>`:""}
        </div>
      </div>
      <div class="cdivider"></div>
      <div class="crow">
        <div class="crow-team">${tlogo(m.awayName,false)}<span class="crow-name">${m.awayName}</span></div>
        <div class="crow-score">
          <div class="crow-runs">${m.awayScore||"—"}</div>
          ${m.awayOvers?`<div class="crow-overs">(${m.awayOvers})</div>`:""}
        </div>
      </div>
      ${m.statusNote?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--blue);font-weight:600">${m.statusNote}</div>`:""}
      ${m.venue?`<div class="cbot">📍 ${m.venue}</div>`:""}
    </div>`;
  }

  // Football card
  return`<div class="card" onclick="openDetail(${m._idx})">
    <div class="card-top">
      <span class="league">⚽ ${m.league}</span>
      ${isLive?`<span class="stag s-live"><span class="dot dot-red"></span>${m.minute?bnN(m.minute)+"′ ":""}${lang==="bn"?"লাইভ":"LIVE"}</span>`:""}
      ${m.status==="upcoming"?`<span class="stag s-up">${fmtTime(m.utcDate)||""}</span>`:""}
      ${isDone?`<span class="stag s-ft">${lang==="bn"?"শেষ":"FT"}</span>`:""}
    </div>
    <div class="teams">
      <div class="team">${tlogo(m.homeName,false)}<div style="min-width:0"><div class="tname">${m.homeName}</div></div></div>
      <div class="scbox">
        ${(isLive||isDone)&&m.homeScore!==null?`<div class="scn ${isLive?"live":""}">${m.homeScore??"-"}<span class="scsep">–</span>${m.awayScore??"-"}</div>${isLive&&m.minute?`<div class="scmin">${bnN(m.minute)}′</div>`:""}`:""}
        ${m.status==="upcoming"?`<div class="scvs">VS</div><div class="sctime">${fmtTime(m.utcDate)||""}</div>`:""}
      </div>
      <div class="team away">${tlogo(m.awayName,false)}<div style="min-width:0;text-align:right"><div class="tname">${m.awayName}</div></div></div>
    </div>
    ${m.venue?`<div class="cbot">📍 ${m.venue}</div>`:""}
  </div>`;
}

function modalH(m,lang){
  const isLive=m.status==="live";const isDone=m.status==="finished";
  if(!m.isF){
    // Cricket modal
    return`<div class="overlay" onclick="if(event.target===this)goBack()">
      <div class="modal">
        <div class="mhead">
          <span class="mleague">🏏 ${m.matchType?m.matchType.toUpperCase()+" · ":""}${m.league}</span>
          <button class="mcls" onclick="goBack()">✕</button>
        </div>
        <div class="mbody">
          ${isLive?`<div style="text-align:center;margin-bottom:12px"><span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--red)"><span class="dot dot-red"></span>${lang==="bn"?"লাইভ চলছে":"LIVE"}</span></div>`:""}
          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px">
            <div style="text-align:center;flex:1"><div style="display:flex;justify-content:center;margin-bottom:6px">${tlogo(m.homeName,true)}</div><div style="font-size:13px;font-weight:700;color:var(--text)">${m.homeName}</div></div>
            <div style="font-size:18px;font-weight:800;color:var(--text3);font-family:'Inter',sans-serif">VS</div>
            <div style="text-align:center;flex:1"><div style="display:flex;justify-content:center;margin-bottom:6px">${tlogo(m.awayName,true)}</div><div style="font-size:13px;font-weight:700;color:var(--text)">${m.awayName}</div></div>
          </div>
          ${m.allInnings&&m.allInnings.length>0?`
          <div class="scorecard">
            <div class="sc-title">${lang==="bn"?"স্কোরকার্ড":"SCORECARD"}</div>
            ${m.allInnings.map(inn=>`
            <div class="sc-inning">
              <div class="sc-inning-name">${inn.name}</div>
              <div class="sc-inning-score">${inn.runs??"-"}${inn.wickets!=null?`/${inn.wickets}`:""}</div>
              ${inn.overs?`<div class="sc-inning-overs">(${inn.overs} ${lang==="bn"?"ওভার":"overs"})</div>`:""} 
            </div>`).join("")}
            ${m.statusNote?`<div class="sc-status">${m.statusNote}</div>`:""}
          </div>`:`
          <div class="scorecard" style="text-align:center;color:var(--text3);font-size:13px;padding:20px">
            ${m.status==="upcoming"?`<div>${lang==="bn"?"ম্যাচ শুরু হয়নি":"Match not started yet"}</div><div style="margin-top:4px;font-size:12px;color:var(--blue)">${fmtTime(m.utcDate)||""}</div>`:lang==="bn"?"স্কোর নেই":"No score available"}
          </div>`}
          ${m.venue?`<div class="m-venue">📍 ${m.venue}</div>`:""}
        </div>
      </div>
    </div>`;
  }

  // Football modal
  return`<div class="overlay" onclick="if(event.target===this)goBack()">
    <div class="modal">
      <div class="mhead">
        <span class="mleague">⚽ ${m.league}</span>
        <button class="mcls" onclick="goBack()">✕</button>
      </div>
      <div class="mbody">
        ${isLive?`<div style="text-align:center;margin-bottom:14px"><span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--red)"><span class="dot dot-red"></span>${m.minute?bnN(m.minute)+"′ ":""}${lang==="bn"?"লাইভ চলছে":"LIVE"}</span></div>`:""}
        <div class="mteams">
          <div class="mteam"><div class="mlogo">${tlogo(m.homeName,true)}</div><div class="mname">${m.homeName}</div></div>
          <div class="msbox">
            ${(isLive||isDone)&&m.homeScore!==null?`<div class="mscore ${isLive?"live":""}">${m.homeScore??"-"}<span style="color:var(--text3);margin:0 4px;font-size:22px">–</span>${m.awayScore??"-"}</div>`:""}
            ${m.status==="upcoming"?`<div style="font-size:20px;font-weight:800;color:var(--border);letter-spacing:3px;font-family:'Inter',sans-serif">VS</div><div style="font-size:12px;color:var(--blue);margin-top:4px">${fmtTime(m.utcDate)||""}</div>`:""}
          </div>
          <div class="mteam"><div class="mlogo">${tlogo(m.awayName,true)}</div><div class="mname">${m.awayName}</div></div>
        </div>
        ${m.venue?`<div class="mvenue">📍 ${m.venue}</div>`:""}
      </div>
    </div>
  </div>`;
}

// ── ACTIONS ──────────────────────────────────────────────────
function openDetail(idx){
  const isF=S.sport==="football";
  if(isF){
    const raw=S.fMatches[idx];
    if(!raw)return;
    S.detail={_idx:idx,isF:true,status:getStatusF(raw),minute:raw.minute||"",
      league:raw.competition?.name||"",homeName:raw.homeTeam?.name||"",awayName:raw.awayTeam?.name||"",
      homeScore:getScoreF(raw,"home"),awayScore:getScoreF(raw,"away"),venue:raw.venue||"",utcDate:raw.utcDate||""};
  } else {
    // Find in filtered list
    const filtered=S.cMatches.filter(m=>{
      const teams=m.teams||[];const name=(m.name||"").toLowerCase();
      if(isICCTeam(teams))return true;
      if(name.includes("indian premier league")||name.includes("ipl"))return true;
      return false;
    });
    const raw=filtered[idx];
    if(!raw)return;
    const parsed=parseCricketScores(raw);
    const teams=raw.teams||[];
    S.detail={_idx:idx,isF:false,
      status:raw.matchStarted&&!raw.matchEnded?"live":raw.matchEnded?"finished":"upcoming",
      league:raw.name||"Cricket",matchType:raw.matchType||"",
      homeName:teams[0]||"",awayName:teams[1]||"",
      homeScore:parsed.homeScore,awayScore:parsed.awayScore,
      homeOvers:parsed.homeOvers,awayOvers:parsed.awayOvers,
      allInnings:parsed.allInnings,
      venue:raw.venue||"",statusNote:raw.status||"",utcDate:raw.dateTimeGMT||""};
  }
  render();
}
function goBack(){S.detail=null;render();}
function setSport(s){S.sport=s;S.detail=null;if(s==="football")fetchFootball();else fetchCricket();}
function setDate(o){S.dateOffset=o;S.detail=null;if(S.sport==="football")fetchFootball();else fetchCricket();}
function setNav(i){S.nav=i;render();}
function toggleLang(){S.lang=S.lang==="bn"?"en":"bn";render();}
function toggleTheme(){S.dark=!S.dark;render();}

function isICCTeam(teams){return teams.some(t=>ICC_TEAMS.some(icc=>t.toLowerCase().includes(icc)));}

fetchFootball();
fetchStandings();
setInterval(()=>{if(S.sport==="football")fetchFootball();else fetchCricket();},60000);
</script>
</body>
</html>
